<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="coverBg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <pattern id="coverGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#coverBg)"/>
  <rect width="1600" height="900" fill="url(#coverGrid)"/>

  <!-- ========== CALENDAR (left area) ========== -->
  <g transform="translate(80, 120)" opacity="0.9">
    <!-- Calendar frame -->
    <rect width="420" height="360" rx="16" fill="#1B2838" stroke="#34d399" stroke-width="2"/>
    <!-- Header bar -->
    <rect x="0" y="0" width="420" height="56" rx="16" fill="#253549"/>
    <rect x="0" y="40" width="420" height="16" fill="#253549"/>
    <!-- Month title -->
    <rect x="150" y="16" width="120" height="20" rx="6" fill="#34d399" opacity="0.5"/>
    <!-- Day headers -->
    <text x="42" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Mon</text>
    <text x="102" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Tue</text>
    <text x="162" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Wed</text>
    <text x="222" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Thu</text>
    <text x="282" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Fri</text>
    <text x="342" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Sat</text>
    <text x="395" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.7">Sun</text>
    <!-- Grid lines -->
    <line x1="0" y1="95" x2="420" y2="95" stroke="#34d399" stroke-width="0.8"/>
    <!-- Day numbers row 1 -->
    <text x="42" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">1</text>
    <text x="102" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">2</text>
    <text x="162" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">3</text>
    <text x="222" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">4</text>
    <text x="282" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">5</text>
    <text x="342" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">6</text>
    <text x="395" y="125" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">7</text>
    <!-- Event blocks -->
    <rect x="18" y="135" width="105" height="22" rx="4" fill="#34d399" opacity="0.35"/>
    <rect x="198" y="135" width="50" height="22" rx="4" fill="#34d399" opacity="0.25"/>
    <!-- Row 2 -->
    <text x="42" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">8</text>
    <text x="102" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">9</text>
    <text x="162" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">10</text>
    <text x="222" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">11</text>
    <text x="282" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">12</text>
    <text x="342" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">13</text>
    <text x="395" y="185" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">14</text>
    <!-- Today highlight -->
    <circle cx="162" cy="180" r="16" fill="#34d399" opacity="0.2"/>
    <rect x="138" y="195" width="110" height="22" rx="4" fill="#34d399" opacity="0.3"/>
    <!-- Row 3 -->
    <text x="42" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">15</text>
    <text x="102" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">16</text>
    <text x="162" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">17</text>
    <text x="222" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">18</text>
    <text x="282" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">19</text>
    <text x="342" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">20</text>
    <text x="395" y="245" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">21</text>
    <rect x="258" y="255" width="160" height="22" rx="4" fill="#34d399" opacity="0.25"/>
    <!-- Row 4 -->
    <text x="42" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">22</text>
    <text x="102" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">23</text>
    <text x="162" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">24</text>
    <text x="222" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">25</text>
    <text x="282" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">26</text>
    <text x="342" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">27</text>
    <text x="395" y="305" font-family="Inter, sans-serif" font-size="15" fill="#34d399" text-anchor="middle">28</text>
    <rect x="78" y="315" width="50" height="22" rx="4" fill="#34d399" opacity="0.2"/>
  </g>

  <!-- ========== CONTACTS (right area) ========== -->
  <g transform="translate(1100, 100)" opacity="0.9">
    <!-- Contacts panel -->
    <rect width="400" height="440" rx="16" fill="#1B2838" stroke="#34d399" stroke-width="2"/>
    <!-- Header -->
    <rect x="0" y="0" width="400" height="50" rx="16" fill="#253549"/>
    <rect x="0" y="34" width="400" height="16" fill="#253549"/>
    <rect x="130" y="14" width="140" height="18" rx="6" fill="#34d399" opacity="0.5"/>
    <!-- Search bar -->
    <rect x="20" y="65" width="360" height="36" rx="8" fill="#253549"/>
    <circle cx="42" cy="83" r="8" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <line x1="48" y1="89" x2="54" y2="95" stroke="#34d399" stroke-width="1.5"/>
    <!-- Contact 1 -->
    <circle cx="50" cy="135" r="20" fill="none" stroke="#34d399" stroke-width="1.8"/>
    <circle cx="50" cy="130" r="7" fill="#34d399" opacity="0.3"/>
    <path d="M35 148 Q50 155 65 148" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="85" y="122" width="160" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <rect x="85" y="140" width="110" height="8" rx="3" fill="#34d399" opacity="0.25"/>
    <!-- Contact 2 -->
    <circle cx="50" cy="200" r="20" fill="none" stroke="#34d399" stroke-width="1.8"/>
    <circle cx="50" cy="195" r="7" fill="#34d399" opacity="0.3"/>
    <path d="M35 213 Q50 220 65 213" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="85" y="187" width="140" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <rect x="85" y="205" width="180" height="8" rx="3" fill="#34d399" opacity="0.25"/>
    <!-- Contact 3 -->
    <circle cx="50" cy="265" r="20" fill="none" stroke="#34d399" stroke-width="1.8"/>
    <circle cx="50" cy="260" r="7" fill="#34d399" opacity="0.3"/>
    <path d="M35 278 Q50 285 65 278" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="85" y="252" width="120" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <rect x="85" y="270" width="150" height="8" rx="3" fill="#34d399" opacity="0.25"/>
    <!-- Contact 4 -->
    <circle cx="50" cy="330" r="20" fill="none" stroke="#34d399" stroke-width="1.8"/>
    <circle cx="50" cy="325" r="7" fill="#34d399" opacity="0.3"/>
    <path d="M35 343 Q50 350 65 343" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="85" y="317" width="170" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <rect x="85" y="335" width="100" height="8" rx="3" fill="#34d399" opacity="0.25"/>
    <!-- Contact 5 -->
    <circle cx="50" cy="395" r="20" fill="none" stroke="#34d399" stroke-width="1.8"/>
    <circle cx="50" cy="390" r="7" fill="#34d399" opacity="0.3"/>
    <path d="M35 408 Q50 415 65 408" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="85" y="382" width="130" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <rect x="85" y="400" width="160" height="8" rx="3" fill="#34d399" opacity="0.25"/>
  </g>

  <!-- ========== TODOS (bottom center) ========== -->
  <g transform="translate(560, 500)" opacity="0.9">
    <!-- Todos panel -->
    <rect width="480" height="320" rx="16" fill="#1B2838" stroke="#34d399" stroke-width="2"/>
    <!-- Header -->
    <rect x="0" y="0" width="480" height="50" rx="16" fill="#253549"/>
    <rect x="0" y="34" width="480" height="16" fill="#253549"/>
    <rect x="170" y="14" width="140" height="18" rx="6" fill="#34d399" opacity="0.5"/>
    <!-- Todo 1 (checked) -->
    <rect x="25" y="70" width="22" height="22" rx="5" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="1.5"/>
    <polyline points="30,82 35,87 42,75" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="65" y="73" width="220" height="10" rx="4" fill="#34d399" opacity="0.3"/>
    <line x1="65" y1="78" x2="285" y2="78" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <!-- Todo 2 (checked) -->
    <rect x="25" y="115" width="22" height="22" rx="5" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="1.5"/>
    <polyline points="30,127 35,132 42,120" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="65" y="118" width="180" height="10" rx="4" fill="#34d399" opacity="0.3"/>
    <line x1="65" y1="123" x2="245" y2="123" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <!-- Todo 3 (unchecked) -->
    <rect x="25" y="160" width="22" height="22" rx="5" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="65" y="163" width="260" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <!-- Todo 4 (unchecked) -->
    <rect x="25" y="205" width="22" height="22" rx="5" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="65" y="208" width="200" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <!-- Todo 5 (unchecked) -->
    <rect x="25" y="250" width="22" height="22" rx="5" fill="none" stroke="#34d399" stroke-width="1.5"/>
    <rect x="65" y="253" width="300" height="10" rx="4" fill="#34d399" opacity="0.5"/>
    <!-- Priority dots -->
    <circle cx="430" cy="171" r="6" fill="#F87171" opacity="0.5"/>
    <circle cx="430" cy="216" r="6" fill="#FCD34D" opacity="0.5"/>
    <circle cx="430" cy="261" r="6" fill="#34d399" opacity="0.5"/>
  </g>

  <!-- ========== SHIELD OVERLAY (center) ========== -->
  <g transform="translate(800, 380) scale(8)" opacity="0.5">
    <path d="M16 5C12.5 7.5 9 8 7 8v10c0 5 4 8.5 9 10 5-1.5 9-5 9-10V8c-2 0-5.5-.5-9-3z" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>

  <!-- ========== LOCK ICONS (scattered) ========== -->
  <g transform="translate(560, 140) scale(1.3)" opacity="0.65">
    <rect x="6" y="12" width="20" height="16" rx="3" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M10 12V8a6 6 0 0 1 12 0v4" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="16" cy="21" r="2" fill="#34d399"/>
  </g>
  <g transform="translate(1020, 600) scale(1.3)" opacity="0.65">
    <rect x="6" y="12" width="20" height="16" rx="3" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M10 12V8a6 6 0 0 1 12 0v4" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="16" cy="21" r="2" fill="#34d399"/>
  </g>

  <!-- Soft glow circles -->
  <circle cx="300" cy="650" r="120" fill="#34d399" opacity="0.1"/>
  <circle cx="1400" cy="200" r="100" fill="#34d399" opacity="0.1"/>
</svg>
