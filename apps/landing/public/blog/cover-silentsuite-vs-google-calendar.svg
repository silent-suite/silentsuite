<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Divider line (center, subtle) -->
  <line x1="800" y1="100" x2="800" y2="800" stroke="#34d399" stroke-width="1" opacity="0.15"/>
  <text x="800" y="80" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle" opacity="0.5">vs</text>

  <!-- ========== LEFT SIDE: Google / Surveillance ========== -->
  <g transform="translate(120, 160)" opacity="0.9">
    <!-- Calendar card -->
    <rect width="520" height="380" rx="16" fill="#1B2838" stroke="#F87171" stroke-width="2"/>
    <rect x="0" y="0" width="520" height="52" rx="16" fill="#253549"/>
    <rect x="0" y="36" width="520" height="16" fill="#253549"/>
    <!-- Google-colored dots in header -->
    <circle cx="28" cy="26" r="8" fill="#4285F4" opacity="0.85"/>
    <circle cx="50" cy="26" r="8" fill="#EA4335" opacity="0.85"/>
    <circle cx="72" cy="26" r="8" fill="#FBBC05" opacity="0.85"/>
    <circle cx="94" cy="26" r="8" fill="#34A853" opacity="0.85"/>
    <!-- Calendar day headers -->
    <text x="65" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Mon</text>
    <text x="140" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Tue</text>
    <text x="215" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Wed</text>
    <text x="290" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Thu</text>
    <text x="365" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Fri</text>
    <text x="440" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Sat</text>
    <text x="495" y="82" font-family="Inter, sans-serif" font-size="12" fill="#F87171" text-anchor="middle" opacity="0.9">Sun</text>
    <line x1="0" y1="92" x2="520" y2="92" stroke="#F87171" stroke-width="0.5" opacity="0.4"/>
    <!-- Event blocks (readable plaintext feel) -->
    <rect x="30" y="105" width="130" height="24" rx="4" fill="#F87171" opacity="0.25"/>
    <text x="40" y="122" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">Therapy 3pm</text>
    <rect x="180" y="105" width="100" height="24" rx="4" fill="#F87171" opacity="0.2"/>
    <text x="190" y="122" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">Dr. Mueller</text>
    <rect x="30" y="155" width="150" height="24" rx="4" fill="#F87171" opacity="0.2"/>
    <text x="40" y="172" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">Job Interview</text>
    <rect x="320" y="155" width="120" height="24" rx="4" fill="#F87171" opacity="0.25"/>
    <text x="330" y="172" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">Date night</text>
    <rect x="105" y="205" width="160" height="24" rx="4" fill="#F87171" opacity="0.2"/>
    <text x="115" y="222" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">Custody lawyer</text>
    <rect x="30" y="255" width="200" height="24" rx="4" fill="#F87171" opacity="0.25"/>
    <text x="40" y="272" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">AA Meeting (weekly)</text>
    <rect x="320" y="305" width="140" height="24" rx="4" fill="#F87171" opacity="0.2"/>
    <text x="330" y="322" font-family="Inter, sans-serif" font-size="11" fill="#F87171" opacity="0.7">Wedding plan</text>
  </g>

  <!-- Eye icon (watching the calendar) -->
  <g transform="translate(310, 600)" opacity="0.7">
    <ellipse cx="50" cy="30" rx="50" ry="28" fill="none" stroke="#F87171" stroke-width="2.5"/>
    <circle cx="50" cy="30" r="16" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="50" cy="30" r="6" fill="#F87171" opacity="0.5"/>
  </g>

  <!-- "Plaintext" label -->
  <text x="380" y="760" font-family="Inter, monospace" font-size="14" fill="#F87171" text-anchor="middle" opacity="0.7">PLAINTEXT</text>

  <!-- ========== RIGHT SIDE: SilentSuite / Encrypted ========== -->
  <g transform="translate(960, 160)" opacity="0.9">
    <!-- Calendar card -->
    <rect width="520" height="380" rx="16" fill="#1B2838" stroke="#34d399" stroke-width="2"/>
    <rect x="0" y="0" width="520" height="52" rx="16" fill="#253549"/>
    <rect x="0" y="36" width="520" height="16" fill="#253549"/>
    <!-- Shield icon in header -->
    <g transform="translate(18, 8) scale(1.2)">
      <path d="M16 3C12.5 5.5 9 6 7 6v8c0 4 3.2 6.8 7.2 8 4-1.2 7.2-4 7.2-8V6c-2 0-4.5-.5-7.2-3z" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.7"/>
    </g>
    <!-- Calendar day headers -->
    <text x="65" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Mon</text>
    <text x="140" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Tue</text>
    <text x="215" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Wed</text>
    <text x="290" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Thu</text>
    <text x="365" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Fri</text>
    <text x="440" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Sat</text>
    <text x="495" y="82" font-family="Inter, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" opacity="0.9">Sun</text>
    <line x1="0" y1="92" x2="520" y2="92" stroke="#34d399" stroke-width="0.5" opacity="0.4"/>
    <!-- Encrypted event blocks (cipher text) -->
    <rect x="30" y="105" width="130" height="24" rx="4" fill="#34d399" opacity="0.25"/>
    <text x="40" y="122" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">xK8mP2q...</text>
    <rect x="180" y="105" width="100" height="24" rx="4" fill="#34d399" opacity="0.2"/>
    <text x="190" y="122" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">bR9vL3...</text>
    <rect x="30" y="155" width="150" height="24" rx="4" fill="#34d399" opacity="0.2"/>
    <text x="40" y="172" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">nW4hJ7kZ...</text>
    <rect x="320" y="155" width="120" height="24" rx="4" fill="#34d399" opacity="0.25"/>
    <text x="330" y="172" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">yT5gN2...</text>
    <rect x="105" y="205" width="160" height="24" rx="4" fill="#34d399" opacity="0.2"/>
    <text x="115" y="222" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">qF8sD6mX...</text>
    <rect x="30" y="255" width="200" height="24" rx="4" fill="#34d399" opacity="0.25"/>
    <text x="40" y="272" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">aH3pK9rW5v...</text>
    <rect x="320" y="305" width="140" height="24" rx="4" fill="#34d399" opacity="0.2"/>
    <text x="330" y="322" font-family="monospace" font-size="10" fill="#34d399" opacity="0.9">cE7uB4...</text>
  </g>

  <!-- Lock icon -->
  <g transform="translate(1190, 600)" opacity="0.7">
    <rect x="6" y="18" width="28" height="22" rx="4" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <path d="M12 18V12a8 8 0 0 1 16 0v6" fill="none" stroke="#34d399" stroke-width="2.5"/>
    <circle cx="20" cy="30" r="3" fill="#34d399" opacity="0.5"/>
  </g>

  <!-- "Ciphertext" label -->
  <text x="1220" y="760" font-family="Inter, monospace" font-size="14" fill="#34d399" text-anchor="middle" opacity="0.7">CIPHERTEXT</text>

  <!-- Soft glow -->
  <circle cx="350" cy="400" r="200" fill="#F87171" opacity="0.08"/>
  <circle cx="1250" cy="400" r="200" fill="#34d399" opacity="0.1"/>
</svg>
