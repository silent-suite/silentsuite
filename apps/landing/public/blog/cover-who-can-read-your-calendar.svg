<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- ========== CENTRAL CALENDAR ========== -->
  <g transform="translate(540, 220)" opacity="0.9">
    <rect width="520" height="440" rx="16" fill="#1B2838" stroke="#34d399" stroke-width="2"/>
    <!-- Header -->
    <rect x="0" y="0" width="520" height="52" rx="16" fill="#253549"/>
    <rect x="0" y="36" width="520" height="16" fill="#253549"/>
    <rect x="180" y="14" width="160" height="20" rx="6" fill="#34d399" opacity="0.4"/>
    <!-- Day headers -->
    <text x="55" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">M</text>
    <text x="130" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">T</text>
    <text x="205" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">W</text>
    <text x="280" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">T</text>
    <text x="355" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">F</text>
    <text x="430" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">S</text>
    <text x="490" y="84" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.9">S</text>
    <line x1="0" y1="95" x2="520" y2="95" stroke="#34d399" stroke-width="0.6" opacity="0.3"/>
    <!-- Day numbers row 1 -->
    <text x="55" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">1</text>
    <text x="130" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">2</text>
    <text x="205" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">3</text>
    <text x="280" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">4</text>
    <text x="355" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">5</text>
    <text x="430" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">6</text>
    <text x="490" y="128" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">7</text>
    <!-- Events -->
    <rect x="30" y="140" width="170" height="22" rx="4" fill="#34d399" opacity="0.3"/>
    <rect x="255" y="140" width="80" height="22" rx="4" fill="#34d399" opacity="0.2"/>
    <!-- Row 2 -->
    <text x="55" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">8</text>
    <text x="130" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">9</text>
    <text x="205" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">10</text>
    <text x="280" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">11</text>
    <text x="355" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">12</text>
    <text x="430" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">13</text>
    <text x="490" y="198" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">14</text>
    <rect x="105" y="210" width="140" height="22" rx="4" fill="#34d399" opacity="0.25"/>
    <rect x="330" y="210" width="120" height="22" rx="4" fill="#34d399" opacity="0.3"/>
    <!-- Row 3 -->
    <text x="55" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">15</text>
    <text x="130" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">16</text>
    <text x="205" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">17</text>
    <text x="280" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">18</text>
    <text x="355" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">19</text>
    <text x="430" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">20</text>
    <text x="490" y="268" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">21</text>
    <rect x="30" y="280" width="200" height="22" rx="4" fill="#34d399" opacity="0.2"/>
    <!-- Row 4 -->
    <text x="55" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">22</text>
    <text x="130" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">23</text>
    <text x="205" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">24</text>
    <text x="280" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">25</text>
    <text x="355" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">26</text>
    <text x="430" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">27</text>
    <text x="490" y="338" font-family="Inter, sans-serif" font-size="16" fill="#34d399" text-anchor="middle">28</text>
    <rect x="180" y="350" width="160" height="22" rx="4" fill="#34d399" opacity="0.25"/>
    <rect x="405" y="350" width="80" height="22" rx="4" fill="#34d399" opacity="0.2"/>
  </g>

  <!-- ========== EYES SURROUNDING THE CALENDAR ========== -->
  <!-- Eye 1: top-left -->
  <g transform="translate(180, 150)" opacity="0.65">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <!-- Line pointing toward calendar -->
    <line x1="80" y1="30" x2="360" y2="150" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Eye 2: top-right -->
  <g transform="translate(1320, 130)" opacity="0.65">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <line x1="0" y1="30" x2="-260" y2="170" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Eye 3: left -->
  <g transform="translate(120, 430)" opacity="0.65">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <line x1="80" y1="22" x2="420" y2="22" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Eye 4: right -->
  <g transform="translate(1380, 400)" opacity="0.65">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <line x1="0" y1="22" x2="-320" y2="40" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Eye 5: bottom-left -->
  <g transform="translate(200, 720)" opacity="0.65">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <line x1="80" y1="10" x2="340" y2="-150" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Eye 6: bottom-right -->
  <g transform="translate(1300, 740)" opacity="0.65">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <line x1="0" y1="10" x2="-240" y2="-170" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Eye 7: bottom center -->
  <g transform="translate(740, 780)" opacity="0.1">
    <ellipse cx="40" cy="22" rx="40" ry="22" fill="none" stroke="#F87171" stroke-width="2"/>
    <circle cx="40" cy="22" r="12" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <circle cx="40" cy="22" r="4" fill="#F87171" opacity="0.85"/>
    <line x1="40" y1="0" x2="60" y2="-110" stroke="#F87171" stroke-width="0.8" opacity="0.3" stroke-dasharray="6 4"/>
  </g>

  <!-- Shield overlay (center, very subtle, protecting) -->
  <g transform="translate(800, 440) scale(5)" opacity="0.45">
    <path d="M16 3C12.5 5.5 9 6 7 6v8c0 4 3.2 6.8 7.2 8 4-1.2 7.2-4 7.2-8V6c-2 0-4.5-.5-7.2-3z" fill="none" stroke="#34d399" stroke-width="2.5"/>
  </g>

  <!-- Soft glow -->
  <circle cx="800" cy="450" r="250" fill="#F87171" opacity="0.08"/>
  <circle cx="800" cy="450" r="150" fill="#34d399" opacity="0.1"/>
</svg>
