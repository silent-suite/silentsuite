<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Outer "encryption boundary" ring -->
  <circle cx="800" cy="450" r="360" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.35" stroke-dasharray="6 8"/>
  <circle cx="800" cy="450" r="380" fill="none" stroke="#34d399" stroke-width="1" opacity="0.18" stroke-dasharray="2 6"/>

  <!-- Soft glow inside the ring -->
  <circle cx="800" cy="450" r="350" fill="#34d399" opacity="0.04"/>

  <!-- =================================================== -->
  <!-- Connection lines between contacts                    -->
  <!-- =================================================== -->
  <g stroke="#34d399" stroke-width="1" fill="none" opacity="0.25">
    <!-- Center node connects to many -->
    <line x1="800" y1="450" x2="650" y2="320"/>
    <line x1="800" y1="450" x2="950" y2="320"/>
    <line x1="800" y1="450" x2="600" y2="480"/>
    <line x1="800" y1="450" x2="1000" y2="480"/>
    <line x1="800" y1="450" x2="700" y2="600"/>
    <line x1="800" y1="450" x2="900" y2="600"/>
    <line x1="800" y1="450" x2="800" y2="280"/>
    <line x1="800" y1="450" x2="800" y2="660"/>

    <!-- Inter-cluster lines -->
    <line x1="650" y1="320" x2="500" y2="240"/>
    <line x1="650" y1="320" x2="800" y2="280"/>
    <line x1="950" y1="320" x2="1100" y2="240"/>
    <line x1="950" y1="320" x2="800" y2="280"/>
    <line x1="600" y1="480" x2="480" y2="540"/>
    <line x1="1000" y1="480" x2="1130" y2="540"/>
    <line x1="700" y1="600" x2="540" y2="680"/>
    <line x1="900" y1="600" x2="1080" y2="680"/>
    <line x1="700" y1="600" x2="800" y2="660"/>
    <line x1="900" y1="600" x2="800" y2="660"/>
  </g>

  <!-- =================================================== -->
  <!-- Contact nodes (encrypted, generic, just initials)   -->
  <!-- Each is a small circle with an initial              -->
  <!-- =================================================== -->
  <g font-family="Inter, sans-serif" font-weight="600" text-anchor="middle">
    <!-- Center node: "you" -->
    <circle cx="800" cy="450" r="38" fill="#1B2838" stroke="#34d399" stroke-width="2.5"/>
    <circle cx="800" cy="450" r="38" fill="url(#nodeGlow)" opacity="0.5"/>
    <text x="800" y="458" font-size="20" fill="#34d399">Y</text>

    <!-- Inner ring nodes -->
    <g>
      <circle cx="650" cy="320" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="650" y="328" font-size="16" fill="#34d399">M</text>

      <circle cx="950" cy="320" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="950" y="328" font-size="16" fill="#34d399">D</text>

      <circle cx="600" cy="480" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="600" y="488" font-size="16" fill="#34d399">L</text>

      <circle cx="1000" cy="480" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="1000" y="488" font-size="16" fill="#34d399">T</text>

      <circle cx="700" cy="600" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="700" y="608" font-size="16" fill="#34d399">S</text>

      <circle cx="900" cy="600" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="900" y="608" font-size="16" fill="#34d399">A</text>

      <circle cx="800" cy="280" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="800" y="288" font-size="16" fill="#34d399">R</text>

      <circle cx="800" cy="660" r="28" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.85"/>
      <text x="800" y="668" font-size="16" fill="#34d399">E</text>
    </g>

    <!-- Outer ring nodes (smaller, fainter) -->
    <g opacity="0.7">
      <circle cx="500" cy="240" r="22" fill="#1B2838" stroke="#34d399" stroke-width="1.5"/>
      <text x="500" y="248" font-size="14" fill="#34d399">B</text>

      <circle cx="1100" cy="240" r="22" fill="#1B2838" stroke="#34d399" stroke-width="1.5"/>
      <text x="1100" y="248" font-size="14" fill="#34d399">K</text>

      <circle cx="480" cy="540" r="22" fill="#1B2838" stroke="#34d399" stroke-width="1.5"/>
      <text x="480" y="548" font-size="14" fill="#34d399">N</text>

      <circle cx="1130" cy="540" r="22" fill="#1B2838" stroke="#34d399" stroke-width="1.5"/>
      <text x="1130" y="548" font-size="14" fill="#34d399">P</text>

      <circle cx="540" cy="680" r="22" fill="#1B2838" stroke="#34d399" stroke-width="1.5"/>
      <text x="540" y="688" font-size="14" fill="#34d399">G</text>

      <circle cx="1080" cy="680" r="22" fill="#1B2838" stroke="#34d399" stroke-width="1.5"/>
      <text x="1080" y="688" font-size="14" fill="#34d399">H</text>
    </g>
  </g>

  <!-- =================================================== -->
  <!-- Lock at the encryption boundary                      -->
  <!-- =================================================== -->
  <g transform="translate(800, 90)">
    <!-- Backdrop -->
    <rect x="-50" y="-10" width="100" height="60" rx="14" fill="#1B2838" stroke="#34d399" stroke-width="2"/>
    <!-- Lock body -->
    <g transform="translate(0, 8)">
      <rect x="-16" y="6" width="32" height="22" rx="4" fill="none" stroke="#34d399" stroke-width="2"/>
      <path d="M-10 6 V0 a10 10 0 0 1 20 0 V6" fill="none" stroke="#34d399" stroke-width="2"/>
      <circle cx="0" cy="17" r="2.5" fill="#34d399"/>
    </g>
  </g>

  <!-- =================================================== -->
  <!-- Caption                                              -->
  <!-- =================================================== -->
  <text x="800" y="850" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#34d399" text-anchor="middle" letter-spacing="3" opacity="0.85">
    YOUR SOCIAL GRAPH, ENCRYPTED
  </text>
</svg>
