<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <pattern id="brick" width="32" height="20" patternUnits="userSpaceOnUse">
      <rect width="32" height="20" fill="none"/>
      <line x1="0" y1="10" x2="32" y2="10" stroke="#64748B" stroke-width="0.8" opacity="0.5"/>
      <line x1="16" y1="0" x2="16" y2="10" stroke="#64748B" stroke-width="0.8" opacity="0.5"/>
      <line x1="0" y1="10" x2="0" y2="20" stroke="#64748B" stroke-width="0.8" opacity="0.5"/>
      <line x1="32" y1="10" x2="32" y2="20" stroke="#64748B" stroke-width="0.8" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Vertical divider -->
  <line x1="800" y1="120" x2="800" y2="780" stroke="#253549" stroke-width="1" opacity="0.6" stroke-dasharray="4 8"/>

  <!-- Soft glow behind right side -->
  <ellipse cx="1180" cy="450" rx="380" ry="320" fill="#34d399" opacity="0.06"/>

  <!-- =================================================== -->
  <!-- LEFT: Walled garden                                  -->
  <!-- =================================================== -->
  <text x="400" y="170" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="3">
    WALLED GARDEN
  </text>
  <text x="400" y="200" font-family="Inter, sans-serif" font-size="13" fill="#64748B" text-anchor="middle" opacity="0.85">
    Encryption inside one provider&apos;s apps
  </text>

  <!-- Wall enclosure -->
  <g transform="translate(140, 240)">
    <!-- Outer wall (brick texture) -->
    <rect x="0" y="0" width="520" height="500" rx="12" fill="none" stroke="#475569" stroke-width="3"/>
    <rect x="0" y="0" width="520" height="500" rx="12" fill="url(#brick)" opacity="0.6"/>

    <!-- Wall caps (top crenellations) -->
    <g fill="#475569" opacity="0.8">
      <rect x="0" y="-8" width="40" height="16"/>
      <rect x="60" y="-8" width="40" height="16"/>
      <rect x="120" y="-8" width="40" height="16"/>
      <rect x="180" y="-8" width="40" height="16"/>
      <rect x="240" y="-8" width="40" height="16"/>
      <rect x="300" y="-8" width="40" height="16"/>
      <rect x="360" y="-8" width="40" height="16"/>
      <rect x="420" y="-8" width="40" height="16"/>
      <rect x="480" y="-8" width="40" height="16"/>
    </g>

    <!-- Locked gate (centered at bottom) -->
    <g transform="translate(220, 380)">
      <rect width="80" height="120" fill="#1B2838" stroke="#94a3b8" stroke-width="2.5"/>
      <line x1="40" y1="0" x2="40" y2="120" stroke="#94a3b8" stroke-width="1.5" opacity="0.6"/>
      <!-- Lock on gate -->
      <g transform="translate(40, 50)">
        <rect x="-12" y="-2" width="24" height="18" rx="3" fill="#1B2838" stroke="#94a3b8" stroke-width="1.8"/>
        <path d="M-7 -2 V-8 a7 7 0 0 1 14 0 V-2" fill="none" stroke="#94a3b8" stroke-width="1.8"/>
      </g>
    </g>

    <!-- One single app inside the garden -->
    <g transform="translate(180, 140)">
      <rect width="160" height="180" rx="14" fill="#1B2838" stroke="#94a3b8" stroke-width="1.8" opacity="0.95"/>
      <!-- Header -->
      <rect x="0" y="0" width="160" height="36" rx="14" fill="#253549"/>
      <rect x="0" y="22" width="160" height="14" fill="#253549"/>
      <circle cx="20" cy="18" r="8" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      <rect x="36" y="13" width="80" height="10" rx="2" fill="#94a3b8" opacity="0.4"/>

      <!-- Icon: shield with lock -->
      <g transform="translate(80, 80)">
        <path d="M0 -22 L18 -14 V0 a25 25 0 0 1 -18 22 a25 25 0 0 1 -18 -22 V-14 z" fill="none" stroke="#94a3b8" stroke-width="1.8"/>
        <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
        <path d="M-5 -4 V-8 a5 5 0 0 1 10 0 V-4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
      </g>

      <!-- Inside-the-garden label -->
      <text x="80" y="155" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">PROVIDER APP</text>
    </g>

    <!-- "Encryption ends here" boundary -->
    <text x="260" y="370" font-family="Inter, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" opacity="0.7" letter-spacing="1">
      ENCRYPTION ONLY INSIDE
    </text>
  </g>

  <!-- =================================================== -->
  <!-- RIGHT: System integration                            -->
  <!-- =================================================== -->
  <text x="1200" y="170" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#34d399" text-anchor="middle" letter-spacing="3">
    SYSTEM INTEGRATION
  </text>
  <text x="1200" y="200" font-family="Inter, sans-serif" font-size="13" fill="#34d399" text-anchor="middle" opacity="0.8">
    Encryption that plugs into the apps you have
  </text>

  <g transform="translate(940, 240)">
    <!-- Outer encryption boundary (dashed teal circle) -->
    <circle cx="260" cy="250" r="245" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.3" stroke-dasharray="6 8"/>
    <circle cx="260" cy="250" r="260" fill="none" stroke="#34d399" stroke-width="1" opacity="0.15" stroke-dasharray="2 6"/>

    <!-- Connection lines from center to clients -->
    <g stroke="#34d399" stroke-width="1.5" opacity="0.45" fill="none">
      <line x1="260" y1="250" x2="100" y2="120"/>
      <line x1="260" y1="250" x2="420" y2="120"/>
      <line x1="260" y1="250" x2="80" y2="250"/>
      <line x1="260" y1="250" x2="440" y2="250"/>
      <line x1="260" y1="250" x2="100" y2="380"/>
      <line x1="260" y1="250" x2="420" y2="380"/>
    </g>

    <!-- Center node: SilentSuite -->
    <g transform="translate(260, 250)">
      <circle r="60" fill="#1B2838" stroke="#34d399" stroke-width="2.5"/>
      <circle r="60" fill="#34d399" opacity="0.06"/>
      <!-- Shield -->
      <g transform="translate(0, -6)">
        <path d="M0 -22 L18 -14 V0 a25 25 0 0 1 -18 22 a25 25 0 0 1 -18 -22 V-14 z" fill="none" stroke="#34d399" stroke-width="2"/>
        <path d="M-7 -2 L-2 4 L7 -6" fill="none" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text y="34" font-family="Inter, sans-serif" font-size="10" fill="#34d399" text-anchor="middle" font-weight="700" letter-spacing="1">
        SILENTSUITE
      </text>
    </g>

    <!-- Client nodes -->
    <g font-family="Inter, sans-serif" text-anchor="middle">
      <!-- Top-left: Apple Calendar -->
      <g transform="translate(100, 120)">
        <circle r="36" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.9"/>
        <g transform="translate(0, -4)">
          <rect x="-12" y="-12" width="24" height="22" rx="3" fill="none" stroke="#34d399" stroke-width="1.6"/>
          <line x1="-12" y1="-6" x2="12" y2="-6" stroke="#34d399" stroke-width="1.6"/>
          <line x1="-7" y1="-15" x2="-7" y2="-9" stroke="#34d399" stroke-width="1.6"/>
          <line x1="7" y1="-15" x2="7" y2="-9" stroke="#34d399" stroke-width="1.6"/>
        </g>
        <text y="22" font-size="9" fill="#34d399" font-weight="600">CALENDAR</text>
      </g>

      <!-- Top-right: Thunderbird -->
      <g transform="translate(420, 120)">
        <circle r="36" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.9"/>
        <g transform="translate(0, -4)">
          <rect x="-13" y="-9" width="26" height="18" rx="2" fill="none" stroke="#34d399" stroke-width="1.6"/>
          <polyline points="-13,-9 0,2 13,-9" fill="none" stroke="#34d399" stroke-width="1.6"/>
        </g>
        <text y="22" font-size="9" fill="#34d399" font-weight="600">THUNDERBIRD</text>
      </g>

      <!-- Middle-left: iOS Contacts -->
      <g transform="translate(80, 250)">
        <circle r="36" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.9"/>
        <g transform="translate(0, -2)">
          <circle cx="0" cy="-7" r="5.5" fill="none" stroke="#34d399" stroke-width="1.6"/>
          <path d="M-10 8 a10 10 0 0 1 20 0" fill="none" stroke="#34d399" stroke-width="1.6"/>
        </g>
        <text y="22" font-size="9" fill="#34d399" font-weight="600">CONTACTS</text>
      </g>

      <!-- Middle-right: Outlook -->
      <g transform="translate(440, 250)">
        <circle r="36" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.9"/>
        <g transform="translate(0, -4)">
          <rect x="-12" y="-10" width="24" height="20" rx="2" fill="none" stroke="#34d399" stroke-width="1.6"/>
          <line x1="-12" y1="-5" x2="12" y2="-5" stroke="#34d399" stroke-width="1.6"/>
          <line x1="-7" y1="-13" x2="-7" y2="-7" stroke="#34d399" stroke-width="1.6"/>
          <line x1="7" y1="-13" x2="7" y2="-7" stroke="#34d399" stroke-width="1.6"/>
        </g>
        <text y="22" font-size="9" fill="#34d399" font-weight="600">OUTLOOK</text>
      </g>

      <!-- Bottom-left: DAVx5 -->
      <g transform="translate(100, 380)">
        <circle r="36" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.9"/>
        <g transform="translate(0, -4)">
          <rect x="-9" y="-13" width="18" height="26" rx="3" fill="none" stroke="#34d399" stroke-width="1.6"/>
          <circle cx="0" cy="9" r="1.5" fill="#34d399"/>
        </g>
        <text y="22" font-size="9" fill="#34d399" font-weight="600">DAVX5</text>
      </g>

      <!-- Bottom-right: Fantastical -->
      <g transform="translate(420, 380)">
        <circle r="36" fill="#1B2838" stroke="#34d399" stroke-width="1.8" opacity="0.9"/>
        <g transform="translate(0, -4)">
          <rect x="-12" y="-12" width="24" height="22" rx="3" fill="none" stroke="#34d399" stroke-width="1.6"/>
          <text y="3" font-size="11" fill="#34d399" font-weight="700">31</text>
        </g>
        <text y="22" font-size="9" fill="#34d399" font-weight="600">FANTASTICAL</text>
      </g>
    </g>
  </g>

  <!-- Subtitle at bottom -->
  <text x="400" y="800" font-family="Inter, sans-serif" font-size="14" fill="#64748B" text-anchor="middle" opacity="0.8">
    Proton, Tuta
  </text>
  <text x="1200" y="800" font-family="Inter, sans-serif" font-size="14" fill="#34d399" text-anchor="middle" opacity="0.85" font-weight="500">
    SilentSuite, EteSync
  </text>
</svg>
