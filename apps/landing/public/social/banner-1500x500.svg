<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Left: Brand -->
  <g transform="translate(80, 160)">
    <!-- Shield icon -->
    <g transform="scale(3.5)">
      <path d="M16 5C12.5 7.5 9 8 7 8v10c0 5 4 8.5 9 10 5-1.5 9-5 9-10V8c-2 0-5.5-.5-9-3z" fill="none" stroke="#34d399" stroke-width="2"/>
    </g>
    <!-- Name -->
    <text x="90" y="30" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">SilentSuite</text>
    <!-- Tagline -->
    <text x="92" y="70" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#8D9FBA">End-to-end encrypted Calendar, Contacts &amp; Tasks</text>
    <!-- Feature pills -->
    <g transform="translate(90, 95)">
      <rect x="0" y="0" width="60" height="26" rx="13" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="0.5"/>
      <text x="30" y="17" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#34d399" text-anchor="middle">E2EE</text>
      <rect x="72" y="0" width="100" height="26" rx="13" fill="#253549"/>
      <text x="122" y="17" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8D9FBA" text-anchor="middle">Open Source</text>
      <rect x="184" y="0" width="90" height="26" rx="13" fill="#253549"/>
      <text x="229" y="17" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#8D9FBA" text-anchor="middle">Self-Host</text>
    </g>
  </g>

  <!-- Right: Mini Calendar UI -->
  <g transform="translate(680, 40)" opacity="0.9">
    <rect width="300" height="260" rx="12" fill="#141E2C" stroke="#253549" stroke-width="1.5"/>
    <rect x="0" y="0" width="300" height="40" rx="12" fill="#1B2838"/>
    <rect x="0" y="28" width="300" height="12" fill="#1B2838"/>
    <text x="150" y="27" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#34d399" text-anchor="middle">March 2026</text>
    <!-- Day headers -->
    <text x="30" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">Mo</text>
    <text x="72" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">Tu</text>
    <text x="114" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">We</text>
    <text x="156" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">Th</text>
    <text x="198" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">Fr</text>
    <text x="240" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">Sa</text>
    <text x="274" y="64" font-family="Inter, sans-serif" font-size="10" fill="#5A7191" text-anchor="middle">Su</text>
    <!-- Week 1 -->
    <text x="114" y="90" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">1</text>
    <text x="156" y="90" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">2</text>
    <text x="198" y="90" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">3</text>
    <text x="240" y="90" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">4</text>
    <text x="274" y="90" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">5</text>
    <!-- Event bar -->
    <rect x="96" y="96" width="90" height="14" rx="3" fill="#34d399" opacity="0.4"/>
    <text x="141" y="107" font-family="Inter, sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Team Sync</text>
    <!-- Week 2 -->
    <text x="30" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">6</text>
    <text x="72" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">7</text>
    <text x="114" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">8</text>
    <text x="156" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">9</text>
    <text x="198" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">10</text>
    <text x="240" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">11</text>
    <text x="274" y="128" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">12</text>
    <rect x="12" y="134" width="70" height="14" rx="3" fill="#3b82f6" opacity="0.4"/>
    <text x="47" y="145" font-family="Inter, sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">Workshop</text>
    <!-- Week 3 -->
    <text x="30" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">13</text>
    <text x="72" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">14</text>
    <text x="114" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">15</text>
    <text x="156" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">16</text>
    <text x="198" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">17</text>
    <text x="240" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">18</text>
    <text x="274" y="168" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">19</text>
