<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#253549" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Shield icon (left side) -->
  <g transform="translate(280, 250) scale(6)" opacity="0.15">
    <path d="M16 5C12.5 7.5 9 8 7 8v10c0 5 4 8.5 9 10 5-1.5 9-5 9-10V8c-2 0-5.5-.5-9-3z" fill="none" stroke="#34d399" stroke-width="1.8"/>
  </g>

  <!-- Main shield (centered-left) -->
  <g transform="translate(380, 250) scale(4)">
    <path d="M16 5C12.5 7.5 9 8 7 8v10c0 5 4 8.5 9 10 5-1.5 9-5 9-10V8c-2 0-5.5-.5-9-3z" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>

  <!-- Brand name -->
  <text x="520" y="235" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">SilentSuite</text>

  <!-- Tagline -->
  <text x="522" y="290" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#8D9FBA" letter-spacing="0.5">Private Sync, By Design.</text>

  <!-- Feature pills -->
  <g transform="translate(520, 320)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#253549"/>
    <text x="60" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#34d399" text-anchor="middle">Calendar</text>

    <rect x="136" y="0" width="120" height="32" rx="16" fill="#253549"/>
    <text x="196" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#34d399" text-anchor="middle">Contacts</text>

    <rect x="272" y="0" width="100" height="32" rx="16" fill="#253549"/>
    <text x="322" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#34d399" text-anchor="middle">Tasks</text>

    <rect x="388" y="0" width="80" height="32" rx="16" fill="#253549"/>
    <text x="428" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#34d399" text-anchor="middle">E2EE</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="494" width="1500" height="6" fill="#34d399" opacity="0.6"/>

  <!-- Decorative dots (right side) -->
  <g opacity="0.08">
    <circle cx="1200" cy="120" r="80" fill="#34d399"/>
    <circle cx="1350" cy="200" r="60" fill="#34d399"/>
    <circle cx="1250" cy="350" r="100" fill="#34d399"/>
  </g>
</svg>
