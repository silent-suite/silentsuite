    <text x="114" y="244" font-family="Inter, sans-serif" font-size="12" fill="#5A7191" text-anchor="middle">29</text>
    <text x="156" y="244" font-family="Inter, sans-serif" font-size="12" fill="#5A7191" text-anchor="middle">30</text>
    <text x="198" y="244" font-family="Inter, sans-serif" font-size="12" fill="#5A7191" text-anchor="middle">31</text>
    <!-- Lock icon in corner -->
