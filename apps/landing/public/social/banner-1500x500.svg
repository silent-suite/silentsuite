      <rect x="3" y="0" width="8" height="5" rx="3" fill="none" stroke="#34d399" stroke-width="1.2"/>
      <rect x="0" y="5" width="14" height="10" rx="2" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Right: Contacts card -->
  <g transform="translate(1010, 40)" opacity="0.85">
    <rect width="220" height="200" rx="12" fill="#141E2C" stroke="#253549" stroke-width="1.5"/>
    <rect x="0" y="0" width="220" height="36" rx="12" fill="#1B2838"/>
    <rect x="0" y="24" width="220" height="12" fill="#1B2838"/>
    <text x="110" y="24" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">Contacts</text>
    <!-- Contact 1 -->
    <circle cx="30" cy="62" r="12" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="0.8"/>
    <text x="30" y="66" font-family="Inter, sans-serif" font-size="9" fill="#34d399" text-anchor="middle" font-weight="600">AR</text>
    <rect x="52" y="55" width="90" height="7" rx="3" fill="#34d399" opacity="0.4"/>
    <rect x="52" y="66" width="60" height="5" rx="2" fill="#253549"/>
    <!-- Contact 2 -->
    <circle cx="30" cy="98" r="12" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="30" y="102" font-family="Inter, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle" font-weight="600">JM</text>
    <rect x="52" y="91" width="110" height="7" rx="3" fill="#3b82f6" opacity="0.3"/>
    <rect x="52" y="102" width="70" height="5" rx="2" fill="#253549"/>
    <!-- Contact 3 -->
    <circle cx="30" cy="134" r="12" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="30" y="138" font-family="Inter, sans-serif" font-size="9" fill="#c4b5fd" text-anchor="middle" font-weight="600">KL</text>
    <rect x="52" y="127" width="80" height="7" rx="3" fill="#8b5cf6" opacity="0.3"/>
    <rect x="52" y="138" width="50" height="5" rx="2" fill="#253549"/>
    <!-- Contact 4 -->
    <circle cx="30" cy="170" r="12" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="30" y="174" font-family="Inter, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="600">SW</text>
    <rect x="52" y="163" width="100" height="7" rx="3" fill="#f59e0b" opacity="0.25"/>
    <rect x="52" y="174" width="65" height="5" rx="2" fill="#253549"/>
    <!-- Lock -->
    <g transform="translate(196, 8)" opacity="0.5">
      <rect x="3" y="0" width="8" height="5" rx="3" fill="none" stroke="#34d399" stroke-width="1.2"/>
      <rect x="0" y="5" width="14" height="10" rx="2" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Right: Tasks card -->
  <g transform="translate(1010, 260)" opacity="0.85">
    <rect width="220" height="180" rx="12" fill="#141E2C" stroke="#253549" stroke-width="1.5"/>
    <rect x="0" y="0" width="220" height="36" rx="12" fill="#1B2838"/>
    <rect x="0" y="24" width="220" height="12" fill="#1B2838"/>
    <text x="110" y="24" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#34d399" text-anchor="middle">Tasks</text>
    <!-- Task 1 (done) -->
    <rect x="16" y="48" width="14" height="14" rx="3" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="0.8"/>
    <path d="M20 55 L23 58 L28 52" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="40" y="51" width="120" height="7" rx="3" fill="#5A7191" opacity="0.5"/>
    <!-- Task 2 -->
    <rect x="16" y="78" width="14" height="14" rx="3" fill="none" stroke="#5A7191" stroke-width="0.8"/>
    <rect x="40" y="81" width="140" height="7" rx="3" fill="#8D9FBA" opacity="0.4"/>
    <rect x="40" y="92" width="80" height="5" rx="2" fill="#34d399" opacity="0.25"/>
    <!-- Task 3 -->
    <rect x="16" y="108" width="14" height="14" rx="3" fill="none" stroke="#5A7191" stroke-width="0.8"/>
    <rect x="40" y="111" width="100" height="7" rx="3" fill="#8D9FBA" opacity="0.4"/>
    <!-- Task 4 -->
    <rect x="16" y="138" width="14" height="14" rx="3" fill="none" stroke="#5A7191" stroke-width="0.8"/>
    <rect x="40" y="141" width="130" height="7" rx="3" fill="#8D9FBA" opacity="0.4"/>
    <rect x="40" y="152" width="60" height="5" rx="2" fill="#f59e0b" opacity="0.25"/>
    <!-- Lock -->
    <g transform="translate(196, 8)" opacity="0.5">
      <rect x="3" y="0" width="8" height="5" rx="3" fill="none" stroke="#34d399" stroke-width="1.2"/>
      <rect x="0" y="5" width="14" height="10" rx="2" fill="#34d399" opacity="0.3" stroke="#34d399" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Glow effects -->
  <circle cx="830" cy="170" r="120" fill="#34d399" opacity="0.03"/>
  <circle cx="1120" cy="340" r="80" fill="#34d399" opacity="0.03"/>

  <!-- Bottom accent -->
  <rect x="0" y="494" width="1500" height="6" fill="#34d399" opacity="0.5"/>
</svg>
