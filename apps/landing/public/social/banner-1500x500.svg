    <text x="72" y="206" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">21</text>
    <text x="114" y="206" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">22</text>
    <text x="156" y="206" font-family="Inter, sans-serif" font-size="12" fill="white" font-weight="600" text-anchor="middle">23</text>
    <circle cx="156" cy="203" r="12" fill="#34d399" opacity="0.3"/>
    <text x="198" y="206" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">24</text>
    <text x="240" y="206" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">25</text>
    <text x="274" y="206" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">26</text>
    <rect x="138" y="212" width="120" height="14" rx="3" fill="#34d399" opacity="0.35"/>
    <text x="198" y="223" font-family="Inter, sans-serif" font-size="8" fill="#34d399" text-anchor="middle">Project Review</text>
    <!-- Week 5 -->
    <text x="30" y="244" font-family="Inter, sans-serif" font-size="12" fill="#8D9FBA" text-anchor="middle">27</text>
