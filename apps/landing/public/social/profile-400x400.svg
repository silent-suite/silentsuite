<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1018"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.15">
    <line x1="0" y1="80" x2="400" y2="80" stroke="#253549" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#253549" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#253549" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="400" y2="320" stroke="#253549" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="#253549" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#253549" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#253549" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#253549" stroke-width="0.5"/>
  </g>

  <!-- Background glow -->
  <circle cx="200" cy="160" r="120" fill="#34d399" opacity="0.05"/>

  <!-- Shield icon (large, centered) -->
  <g transform="translate(200, 145) scale(7)">
    <path d="M16 5C12.5 7.5 9 8 7 8v10c0 5 4 8.5 9 10 5-1.5 9-5 9-10V8c-2 0-5.5-.5-9-3z" fill="none" stroke="#34d399" stroke-width="1.5"/>
  </g>

  <!-- Mini icons inside shield area -->
  <!-- Calendar -->
  <g transform="translate(170, 145)">
    <rect width="16" height="14" rx="2" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.6"/>
    <line x1="0" y1="5" x2="16" y2="5" stroke="#34d399" stroke-width="0.8" opacity="0.6"/>
    <rect x="3" y="7" width="3" height="3" rx="0.5" fill="#34d399" opacity="0.4"/>
    <rect x="10" y="7" width="3" height="3" rx="0.5" fill="#34d399" opacity="0.4"/>
  </g>
  <!-- Contacts -->
  <g transform="translate(192, 145)">
    <circle cx="8" cy="5" r="4" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.6"/>
    <path d="M1 15 Q8 11 15 15" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- Tasks -->
  <g transform="translate(214, 145)">
    <rect width="14" height="14" rx="2" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.6"/>
    <path d="M3 7 L6 10 L11 4" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Brand name -->
  <text x="200" y="285" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-0.5">SilentSuite</text>

  <!-- Tagline -->
  <text x="200" y="315" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#5A7191" text-anchor="middle">Private Sync, By Design</text>

  <!-- E2EE pill -->
  <rect x="155" y="330" width="90" height="24" rx="12" fill="#34d399" opacity="0.1" stroke="#34d399" stroke-width="0.6"/>
  <text x="200" y="346" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399" text-anchor="middle">End-to-End Encrypted</text>
</svg>
