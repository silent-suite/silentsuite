  <!-- Lock body -->
  <rect x="78" y="100" width="44" height="36" rx="8" fill="url(#tealGrad)"/>
  <!-- Lock shackle -->
  <path d="M88 100 V86 A12 12 0 0 1 112 86 V100" fill="none" stroke="url(#tealGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="100" cy="115" r="5" fill="white"/>
  <rect x="97.5" y="117" width="5" height="10" rx="2.5" fill="white"/>
</svg>
