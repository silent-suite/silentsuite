<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d1f33"/>
      <stop offset="1" stop-color="#06251c"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="screenDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12223a"/>
      <stop offset="1" stop-color="#0b1728"/>
    </linearGradient>
    <linearGradient id="device" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#465b7b"/>
      <stop offset="1" stop-color="#18283d"/>
    </linearGradient>
    <linearGradient id="deviceDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7890b5"/>
      <stop offset="1" stop-color="#354964"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg); }
    .panel { fill: rgba(255,255,255,0.74); stroke: #dbe7f3; }
    .device { fill: url(#device); }
    .screen { fill: url(#screen); stroke: #bfd0e5; }
    .card { fill: #ffffff; stroke: #dbe7f3; }
    .server { fill: #ffffff; stroke: #d6e3f0; }
    .server-top { fill: #253549; }
    .rack { fill: #f1f5f9; stroke: #dbe7f3; }
    .title { fill: #0f172a; }
    .muted { fill: #475569; }
    .accent { fill: #047857; }
    .mono { fill: #64748b; }
    .badge { fill: #ecfdf5; stroke: #6ee7b7; }
    .danger { fill: #b91c1c; }
    .arrow { stroke: #10b981; }
    .arrow-chip { fill: #ecfdf5; stroke: #6ee7b7; }
    .chrome { fill: #e2e8f0; }
    .phone-bar { fill: #172033; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: url(#bgDark); }
      .panel { fill: rgba(15,23,42,0.72); stroke: #27415f; }
      .device { fill: url(#deviceDark); }
      .screen { fill: url(#screenDark); stroke: #49617f; }
      .card { fill: #172338; stroke: #334963; }
      .server { fill: #111c2f; stroke: #334963; }
      .server-top { fill: #587096; }
      .rack { fill: #0b1424; stroke: #304761; }
      .title { fill: #f8fafc; }
      .muted { fill: #cbd5e1; }
      .accent { fill: #5eead4; }
      .mono { fill: #cbd5e1; }
      .badge { fill: #042f2e; stroke: #2dd4bf; }
      .danger { fill: #fca5a5; }
      .arrow { stroke: #5eead4; }
      .arrow-chip { fill: #042f2e; stroke: #2dd4bf; }
      .chrome { fill: #334155; }
      .phone-bar { fill: #020617; }
    }
  </style>

  <rect class="bg" width="920" height="280" rx="22"/>
  <rect class="panel" x="26" y="24" width="868" height="232" rx="22"/>

  <g filter="url(#shadow)">
    <rect class="device" x="68" y="66" width="226" height="144" rx="16"/>
    <rect class="screen" x="80" y="78" width="202" height="118" rx="10"/>
    <rect class="chrome" x="80" y="78" width="202" height="20" rx="10"/>
    <circle cx="94" cy="88" r="3.2" fill="#ef4444"/>
    <circle cx="106" cy="88" r="3.2" fill="#f59e0b"/>
    <circle cx="118" cy="88" r="3.2" fill="#10b981"/>
    <rect class="card" x="98" y="112" width="72" height="52" rx="8"/>
    <rect x="111" y="124" width="46" height="5" rx="2.5" fill="#10b981"/>
    <rect x="111" y="137" width="34" height="5" rx="2.5" fill="#93c5fd"/>
    <rect x="111" y="150" width="44" height="5" rx="2.5" fill="#c4b5fd"/>
    <rect class="card" x="184" y="112" width="70" height="52" rx="8"/>
    <path d="M202 141 l10 10 24 -28" fill="none" stroke="#10b981" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <rect class="device" x="52" y="210" width="258" height="14" rx="7"/>
    <rect class="screen" x="126" y="211" width="110" height="5" rx="2.5" opacity="0.75"/>
  </g>
  <text class="title" x="181" y="247" text-anchor="middle" font-size="17" font-weight="700">Your device</text>
  <text class="accent" x="181" y="266" text-anchor="middle" font-size="13" font-weight="650">Encrypt locally</text>

  <line class="arrow" x1="326" y1="142" x2="388" y2="142" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 8"/>
  <path d="M386 132 L408 142 L386 152 Z" fill="#10b981"/>
  <rect class="arrow-chip" x="322" y="103" width="86" height="30" rx="15"/>
  <text class="accent" x="365" y="123" text-anchor="middle" font-size="12" font-weight="750">ciphertext</text>

  <g filter="url(#shadow)">
    <rect class="server" x="408" y="55" width="184" height="172" rx="18"/>
    <rect class="server-top" x="408" y="55" width="184" height="46" rx="18"/>
    <rect class="server-top" x="408" y="84" width="184" height="18"/>
    <text x="500" y="84" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="750">Sync server</text>
    <rect class="rack" x="432" y="118" width="136" height="24" rx="7"/>
    <rect class="rack" x="432" y="150" width="136" height="24" rx="7"/>
    <rect class="rack" x="432" y="182" width="136" height="24" rx="7"/>
    <text class="mono" x="500" y="135" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">8f2a...91dc</text>
    <text class="mono" x="500" y="167" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">c7b1...4e08</text>
    <text class="mono" x="500" y="199" text-anchor="middle" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">a03d...bb62</text>
    <rect class="badge" x="457" y="222" width="86" height="28" rx="14"/>
    <text class="danger" x="500" y="241" text-anchor="middle" font-size="12" font-weight="800">No keys</text>
  </g>

  <line class="arrow" x1="613" y1="142" x2="675" y2="142" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 8"/>
  <path d="M673 132 L695 142 L673 152 Z" fill="#10b981"/>
  <rect class="arrow-chip" x="609" y="103" width="86" height="30" rx="15"/>
  <text class="accent" x="652" y="123" text-anchor="middle" font-size="12" font-weight="750">ciphertext</text>

  <g filter="url(#shadow)">
    <rect class="device" x="716" y="48" width="126" height="202" rx="28"/>
    <rect class="screen" x="728" y="64" width="102" height="168" rx="18"/>
    <rect class="phone-bar" x="760" y="56" width="38" height="7" rx="3.5"/>
    <rect class="card" x="743" y="88" width="72" height="30" rx="8"/>
    <rect x="754" y="100" width="50" height="5" rx="2.5" fill="#10b981"/>
    <rect class="card" x="743" y="128" width="72" height="50" rx="8"/>
    <circle cx="759" cy="144" r="6" fill="#93c5fd"/>
    <rect x="772" y="140" width="31" height="5" rx="2.5" fill="#cbd5e1"/>
    <circle cx="759" cy="163" r="6" fill="#c4b5fd"/>
    <rect x="772" y="159" width="31" height="5" rx="2.5" fill="#cbd5e1"/>
    <rect x="762" y="196" width="34" height="5" rx="2.5" fill="#94a3b8"/>
    <rect x="762" y="209" width="34" height="4" rx="2" fill="#64748b"/>
    <circle cx="779" cy="231" r="2.5" fill="#94a3b8"/>
  </g>
  <text class="title" x="779" y="247" text-anchor="middle" font-size="17" font-weight="700">Your device</text>
  <text class="accent" x="779" y="266" text-anchor="middle" font-size="13" font-weight="650">Decrypt locally</text>
</svg>
