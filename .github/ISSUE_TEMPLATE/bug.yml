name: Bug report
description: Something is broken or behaving unexpectedly.
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which surface is affected?
      options:
        - webapp (app.silentsuite.io)
        - server (Etebase sync server)
        - bridge (CalDAV/CardDAV)
        - android
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      placeholder: Steps, sample data, or commands.
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: Browser/OS, app version, self-hosted vs hosted, anything relevant.
