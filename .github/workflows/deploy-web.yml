name: Deploy Web App (production)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile.web'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/silent-suite/silentsuite-web:latest
            ghcr.io/silent-suite/silentsuite-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_ETEBASE_SERVER_URL=https://server.silentsuite.io
            NEXT_PUBLIC_BILLING_API_URL=https://api.silentsuite.io
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/silent-suite/silentsuite-web:latest
            docker tag ghcr.io/silent-suite/silentsuite-web:latest etebase-web:latest
            cd ~/etebase
            docker compose up -d --force-recreate web
            echo "Web app deployed successfully"

      - name: Post-deploy health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://app.silentsuite.io/; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
