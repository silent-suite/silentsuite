name: CI Server

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'

concurrency:
  group: ci-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-server:
    name: Server Tests & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DJANGO_SETTINGS_MODULE: etebase_server.settings

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Compile check (smoke test)
        working-directory: server
        run: |
          python -m py_compile manage.py
          python -m py_compile etebase_server/settings.py
          python -m py_compile etebase_server/urls.py
          python -m py_compile etebase_server/utils.py
          python -m py_compile etebase_server/myauth/tests.py

      - name: Verify Django app loads
        working-directory: server
        run: python -c "import django; django.setup(); print('Django loaded OK')"

      - name: Lint with ruff
        working-directory: server
        run: ruff check . --select=E,F,I --ignore=E501
        continue-on-error: true

      - name: Run tests
        working-directory: server
        run: python -m pytest etebase_server/ -v --tb=short || python manage.py test --verbosity=2
