name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
        continue-on-error: true  # TODO: fix pre-existing lint errors (hooks ordering, unescaped entities, missing TS rules)

      - name: Type check
        run: pnpm run type-check
        continue-on-error: true  # TODO: fix pre-existing type errors (Buffer, @types/node, globalThis)

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
        continue-on-error: true  # TODO: remove once pre-existing test failures are fixed (sync store, auth store, SyncIndicator)

  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    needs: [lint-and-typecheck, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: silentsuite-web:ci-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_ETEBASE_SERVER_URL=https://server.silentsuite.io
            NEXT_PUBLIC_BILLING_API_URL=https://api.silentsuite.io
          cache-from: type=gha
          cache-to: type=gha,mode=max
