name: Preview Web App (feature branches + PRs)

on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'fix/**'
      - 'blog/**'
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile.web'
      - 'pnpm-lock.yaml'
      - '.github/workflows/preview-web.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile.web'
      - 'pnpm-lock.yaml'

concurrency:
  group: preview-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/silent-suite/silentsuite-web:preview
            ghcr.io/silent-suite/silentsuite-web:preview-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_ETEBASE_SERVER_URL=https://server.silentsuite.io
            NEXT_PUBLIC_BILLING_API_URL=https://api.silentsuite.io
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_TEST_PUBLISHABLE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy preview to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/silent-suite/silentsuite-web:preview
            cd ~/etebase
            docker compose -f docker-compose.preview.yml up -d --force-recreate web-preview
            echo "Preview deployed: https://previewapp.silentsuite.io (branch: ${{ github.ref_name }})"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = `**Preview deployed** ✅\n\n🔗 https://previewapp.silentsuite.io\n📦 \`ghcr.io/silent-suite/silentsuite-web:preview-${context.sha.substring(0, 7)}\`\n🌿 Branch: \`${context.payload.pull_request.head.ref}\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
