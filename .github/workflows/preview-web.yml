name: Preview Web App (develop + PRs)

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile.web'
      - 'pnpm-lock.yaml'
      - '.github/workflows/preview-web.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'Dockerfile.web'
      - 'pnpm-lock.yaml'

concurrency:
  group: preview-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    name: Build Preview Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/silent-suite/silentsuite-web:preview
            ghcr.io/silent-suite/silentsuite-web:preview-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_ETEBASE_SERVER_URL=https://server.silentsuite.io
            NEXT_PUBLIC_BILLING_API_URL=https://api.silentsuite.io
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `**Web preview image built** ✅\n\nImage: \`ghcr.io/silent-suite/silentsuite-web:preview-${context.sha.substring(0, 7)}\`\n\nTo test locally:\n\`\`\`bash\ndocker pull ghcr.io/silent-suite/silentsuite-web:preview-${context.sha.substring(0, 7)}\ndocker run -p 3000:3000 ghcr.io/silent-suite/silentsuite-web:preview-${context.sha.substring(0, 7)}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Web preview image built')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
