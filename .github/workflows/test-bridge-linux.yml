name: Test Bridge (Linux x86_64)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build linux-x86_64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # etebase-py 0.31.5 uses cpython 0.7.x which doesn't support Python 3.12+
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.63.0"

      - name: Install dependencies
        working-directory: bridge
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev,tray]" || pip install -e ".[tray]" || pip install -e .

      - name: Build binary
        working-directory: bridge
        run: |
          pyinstaller silentsuite-bridge.spec --clean --noconfirm \
            --distpath dist/ \
            --workpath build/

      - name: Smoke test
        working-directory: bridge
        run: |
          dist/silentsuite-bridge --version
          dist/silentsuite-bridge --help

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: silentsuite-bridge-linux-x86_64-test
          path: bridge/dist/silentsuite-bridge
          if-no-files-found: error
          retention-days: 7
