name: Deploy SilentSuite Server (production)

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'Dockerfile.server'
      - '.github/workflows/deploy-server.yml'

concurrency:
  group: deploy-server-production
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/silent-suite/silentsuite-server:latest
            ghcr.io/silent-suite/silentsuite-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/silent-suite/silentsuite-server:latest
            cd ~/etebase
            docker compose up -d --force-recreate silentsuite-server
            echo "SilentSuite server deployed successfully"
