services:
  postgres:
    image: postgres:16-alpine
    container_name: silentsuite-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-silentsuite}
      POSTGRES_USER: ${DATABASE_USER:-silentsuite}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-silentsuite} -d ${DATABASE_NAME:-silentsuite}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    shm_size: 128mb
    command: postgres -c max_connections=200
    networks:
      - silentsuite

  server:
    image: victorrds/etebase:latest
    container_name: silentsuite-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SERVER_PORT:-3735}:3735"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER: http
      # AUTO_UPDATE: set to "true" to enable automatic Etebase server updates on container restart.
      # Disabled by default for stability — opt in when you're ready to accept upstream changes.
      AUTO_UPDATE: "false"
      AUTO_SIGNUP: "true"
      DB_ENGINE: postgres
      DATABASE_NAME: ${DATABASE_NAME:-silentsuite}
      DATABASE_USER: ${DATABASE_USER:-silentsuite}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      SUPER_USER: ${SUPER_USER:-admin}
      SUPER_PASS: ${SUPER_PASS}
    volumes:
      - server_data:/data
      - ./success.html:/etebase/etebase_server/templates/success.html:ro
      - ./etebase-server.ini:/data/etebase-server.ini
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3735/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - silentsuite

volumes:
  pgdata:
  server_data:

networks:
  silentsuite:
    driver: bridge
