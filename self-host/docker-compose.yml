services:
  postgres:
    image: postgres:16-alpine
    container_name: silentsuite-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-silentsuite}
      POSTGRES_USER: ${DATABASE_USER:-silentsuite}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-silentsuite} -d ${DATABASE_NAME:-silentsuite}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    shm_size: 128mb
    networks:
      - internal

  server:
    image: victorrds/etebase:latest
    container_name: silentsuite-server
    restart: unless-stopped
    expose:
      - "3735"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER: http
      AUTO_UPDATE: "true"
      AUTO_SIGNUP: "true"
      DB_ENGINE: postgres
      DATABASE_NAME: ${DATABASE_NAME:-silentsuite}
      DATABASE_USER: ${DATABASE_USER:-silentsuite}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      ALLOWED_HOSTS: ${DOMAIN}
      SUPER_USER: ${SUPER_USER:-admin}
      SUPER_PASS: ${SUPER_PASS}
    volumes:
      - server_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3735/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - proxy

  caddy:
    image: caddy:2-alpine
    container_name: silentsuite-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - server
    networks:
      - proxy

volumes:
  pgdata:
  server_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge
