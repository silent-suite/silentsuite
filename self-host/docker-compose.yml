services:
  postgres:
    image: postgres:16.9-alpine
    container_name: silentsuite-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-silentsuite}
      POSTGRES_USER: ${DATABASE_USER:-silentsuite}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-silentsuite} -d ${DATABASE_NAME:-silentsuite}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    shm_size: 128mb
    command: postgres -c max_connections=200
    networks:
      - silentsuite

  server:
    # Pinned to a specific manifest digest. To upgrade, re-run install.sh,
    # which fetches the latest compose (will become release-tag-pinned once
    # the installer's --version flag lands). Editing this digest by hand
    # decouples the compose from the rest of the release matrix.
    image: ghcr.io/silent-suite/silentsuite-server@sha256:6d45c6750c5913bf0ab43eec8b85be2213c133eb8bd7c50e9aeb3fee80194509
    container_name: silentsuite-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SERVER_PORT:-3735}:3735"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Django /admin/ superuser. Created on first boot if both are set and the
      # user does not already exist; otherwise the entrypoint silently skips.
      SUPER_USER: ${SUPER_USER:-admin}
      SUPER_PASS: ${SUPER_PASS}
      # Open registration toggle. "true" blocks new signups (use after the
      # operator's admin account is registered). Default "false" allows signup.
      ETEBASE_DISABLE_SIGNUP: ${ETEBASE_DISABLE_SIGNUP:-false}
      # One-time first-admin signup token. When set, the first signup must use
      # https://YOUR_DOMAIN/?bootstrap_token=TOKEN as the server URL.
      ETEBASE_BOOTSTRAP_ADMIN_TOKEN: ${ETEBASE_BOOTSTRAP_ADMIN_TOKEN:-}
      # Hide the advanced Django admin panel unless explicitly re-enabled.
      ETEBASE_DISABLE_DJANGO_ADMIN: ${ETEBASE_DISABLE_DJANGO_ADMIN:-true}
      # Only these reverse proxy IPs may set X-Forwarded-* headers.
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-127.0.0.1}
    volumes:
      - server_data:/data
      - ./success.html:/app/etebase_server/templates/success.html:ro
      - ./etebase-server.ini:/etc/etebase-server/etebase-server.ini:ro
    healthcheck:
      # Treat any non-5xx HTTP response as healthy. The server runs behind a
      # TLS-terminating reverse proxy and Django's SECURE_SSL_REDIRECT (enabled
      # when debug=false) 301-redirects this in-container plain-HTTP probe to
      # https://, which urllib would follow and fail against the plaintext port.
      # http.client does not follow redirects, so a 301 here still means "up".
      test: ["CMD-SHELL", "python -c \"import http.client,sys; c=http.client.HTTPConnection('localhost',3735,timeout=5); c.request('GET','/'); sys.exit(0 if c.getresponse().status<500 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - silentsuite

volumes:
  pgdata:
  server_data:

networks:
  silentsuite:
    driver: bridge
