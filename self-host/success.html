<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SilentSuite Sync Server</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 480px;
        padding: 2rem;
      }
      .logo {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #f8fafc;
        margin-bottom: 0.5rem;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: #34d399;
        padding: 0.375rem 0.875rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 1.5rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        background: #34d399;
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      p {
        color: #94a3b8;
        font-size: 0.9375rem;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .links {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      a {
        color: #34d399;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 0.5rem;
        transition: all 0.15s ease;
      }
      a:hover {
        background: rgba(16, 185, 129, 0.1);
        border-color: #34d399;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🤫</div>
      <h1>SilentSuite Sync Server</h1>
      <div class="status"><span class="dot"></span> Running</div>
      <p>
        Your self-hosted sync server is up and running.
        Connect using the SilentSuite app or any CalDAV/CardDAV client.
      </p>
      <div class="links">
        <a href="https://app.silentsuite.io">Open Web App</a>
        <a href="https://docs.silentsuite.io/self-hosting">Documentation</a>
      </div>
    </div>
  </body>
</html>
